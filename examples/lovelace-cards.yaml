# Thread Network Topology - Lovelace Card Examples
# Copy any of these configurations to your dashboard

# ===========================================
# GRAPH: Force-directed mesh map (custom card)
# ===========================================
# The integration ships a custom card that draws the mesh as a graph: routers
# as coloured hexagons (red = leader, blue = connected OTBR, amber = router),
# the router-to-router links coloured + labelled by link quality, and each
# router's children hanging off it. The card's JS is served and registered by
# the integration automatically - no manual Resources entry or HACS frontend
# repo needed. (If it doesn't appear, hard-refresh the browser to clear the
# cached dashboard, since the resource is added on HA start.)

type: custom:thread-topology-card
entity: sensor.thread_topology_map   # optional (this is the default)
title: Thread Network                # optional
height: 460                          # optional, px

# ===========================================
# EASIEST: The topology diagram (ASCII tree)
# ===========================================
# The built-in Markdown card renders the monospace tree directly - no custom
# cards or HACS dependencies needed.

type: markdown
title: Thread Network
content: "{{ state_attr('sensor.thread_topology_map', 'topology_text') }}"

# ===========================================
# COMPLETE: Stats + Topology Map
# ===========================================
# Use a vertical-stack to show stats tiles above the map

type: vertical-stack
cards:
  # Stats row
  - type: horizontal-stack
    cards:
      - type: tile
        entity: sensor.thread_network
        name: Border Routers
        icon: mdi:router-wireless
        color: cyan
        state_content: router_count
      - type: tile
        entity: sensor.thread_network
        name: Thread Devices
        icon: mdi:devices
        color: teal
        state_content: total_thread_devices
      - type: tile
        entity: sensor.thread_network
        name: Matter Thread
        icon: mdi:home-automation
        color: green
        state_content: matter_thread_devices
      - type: tile
        entity: sensor.thread_network
        name: Matter WiFi
        icon: mdi:wifi
        color: purple
        state_content: matter_wifi_devices

  # Topology diagram (ASCII tree)
  - type: markdown
    content: "{{ state_attr('sensor.thread_topology_map', 'topology_text') }}"

# ===========================================
# STYLED: With monospace font (requires card-mod)
# ===========================================
# If you have card-mod installed via HACS, you can style the topology

type: markdown
content: "{{ state_attr('sensor.thread_topology_map', 'topology_text') }}"
card_mod:
  style: |
    ha-card {
      background: var(--card-background-color);
    }
    ha-markdown {
      font-family: monospace;
      font-size: 14px;
      line-height: 1.8;
    }

# ===========================================
# INDIVIDUAL ROUTER TILES
# ===========================================
# Each border router gets its own sensor, named after the router (e.g. a named
# router becomes sensor.thread_<router_name>; unnamed routers fall back to
# sensor.thread_node_xxxx). Check Developer Tools > States for your exact sensor ids.

type: horizontal-stack
cards:
  - type: tile
    entity: sensor.thread_ikea_alpstuga  # Replace with your sensor
    name: Leader
    icon: mdi:crown
    color: amber
  - type: tile
    entity: sensor.thread_node_3c00  # Replace with your sensor
    name: Connected OTBR
    icon: mdi:router-wireless
    color: blue
